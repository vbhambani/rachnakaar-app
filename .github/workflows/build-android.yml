name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      - run: flutter create . --org com.rachnakaar --project-name rachnakaar --platforms android
      - run: flutter pub get
      - run: flutter build apk --release
      - run: mkdir -p out && cp build/app/outputs/flutter-apk/app-release.apk out/rachnakaar-${{ github.run_number }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: rachnakaar-apk
          path: out/rachnakaar-*.apk
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: Rachnakaar build ${{ github.run_number }}
          body: "Auto-built Android APK. Install on any phone."
          files: out/rachnakaar-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
